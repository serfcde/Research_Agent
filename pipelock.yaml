# Pipelock config — balanced preset
# Generated by: pipelock generate config --preset balanced
# Docs: https://github.com/luckyPipewrench/pipelock

version: 1
mode: balanced
enforce: null
explain_blocks: null
api_allowlist:
    - '*.anthropic.com'
    - '*.openai.com'
    - api.telegram.org
    - '*.discord.com'
    - gateway.discord.gg
    - '*.slack.com'
    - github.com
    - '*.github.com'
    - '*.githubusercontent.com'
    - registry.npmjs.org
    - api.groq.com
    - api.tavily.com
    - serpapi.com
suppress: []
fetch_proxy:
    listen: 127.0.0.1:8888
    timeout_seconds: 30
    max_response_mb: 10
    user_agent: Pipelock Fetch/1.0
    monitoring:
        max_url_length: 2048
        entropy_threshold: 4.5
        subdomain_entropy_threshold: 4
        max_requests_per_minute: 60
        max_data_per_minute: 0
        blocklist:
            - '*.pastebin.com'
            - '*.hastebin.com'
            - '*.paste.ee'
            - '*.transfer.sh'
            - '*.file.io'
            - '*.requestbin.com'
        subdomain_entropy_exclusions: []
forward_proxy:
    enabled: true
    max_tunnel_seconds: 300
    idle_timeout_seconds: 120
    sni_verification: true
    redirect_websocket_hosts: []
websocket_proxy:
    enabled: false
    max_message_bytes: 1048576
    max_concurrent_connections: 128
    scan_text_frames: true
    allow_binary_frames: false
    forward_cookies: false
    strip_compression: true
    max_connection_seconds: 3600
    idle_timeout_seconds: 300
    origin_policy: rewrite
dlp:
    scan_env: true
    secrets_file: ""
    min_env_secret_length: 0
    include_defaults: null
    patterns:
        - name: Anthropic API Key
          regex: sk-ant-[a-zA-Z0-9\-_]{10,}
          severity: critical
          exempt_domains: []
        - name: OpenAI API Key
          regex: sk-proj-[a-zA-Z0-9\-_]{10,}
          severity: critical
          exempt_domains: []
        - name: OpenAI Service Key
          regex: sk-svcacct-[a-zA-Z0-9\-]{10,}
          severity: critical
          exempt_domains: []
        - name: Fireworks API Key
          regex: fw_[a-zA-Z0-9]{24,}
          severity: critical
          exempt_domains: []
        - name: Google API Key
          regex: AIza[0-9A-Za-z\-_]{35}
          severity: high
          exempt_domains: []
        - name: Google OAuth Client Secret
          regex: GOCSPX-[A-Za-z0-9_\-]{28,}
          severity: critical
          exempt_domains: []
        - name: Stripe Key
          regex: '[sr]k[-_](live|test)[-_][a-zA-Z0-9]{20,}'
          severity: critical
          exempt_domains: []
        - name: Stripe Webhook Secret
          regex: whsec_[a-zA-Z0-9_\-]{20,}
          severity: critical
          exempt_domains: []
        - name: GitHub Token
          regex: gh[pousr]_[A-Za-z0-9_]{36,}
          severity: critical
          exempt_domains: []
        - name: GitHub Fine-Grained PAT
          regex: github_pat_[a-zA-Z0-9_]{36,}
          severity: critical
          exempt_domains: []
        - name: GitLab PAT
          regex: glpat-[a-zA-Z0-9\-_]{20,}
          severity: critical
          exempt_domains: []
        - name: AWS Access ID
          regex: (AKIA|A3T|AGPA|AIDA|AROA|AIPA|ANPA|ANVA|ASIA)[A-Z0-9]{16,}
          severity: critical
          exempt_domains: []
        - name: AWS Secret Key
          regex: (?:aws_secret_access_key|AWS_SECRET_ACCESS_KEY|secret.?access.?key|SecretAccessKey)\s*["'=:\s]{1,5}\s*[A-Za-z0-9/+=]{40}
          severity: critical
          exempt_domains: []
        - name: Google OAuth Token
          regex: ya29\.[a-zA-Z0-9_-]{20,}
          severity: critical
          exempt_domains: []
        - name: Slack Token
          regex: xox[bpras]-[0-9a-zA-Z-]{15,}
          severity: critical
          exempt_domains: []
        - name: Slack App Token
          regex: xapp-[0-9]+-[A-Za-z0-9_]+-[0-9]+-[a-f0-9]+
          severity: critical
          exempt_domains: []
        - name: Discord Bot Token
          regex: '[MN][A-Za-z0-9]{23,}\.[A-Za-z0-9\-_]{6}\.[A-Za-z0-9\-_]{27,}'
          severity: critical
          exempt_domains: []
        - name: Twilio API Key
          regex: SK[a-f0-9]{32}
          severity: high
          exempt_domains: []
        - name: SendGrid API Key
          regex: SG\.[a-zA-Z0-9_-]{22}\.[a-zA-Z0-9_-]{43}
          severity: critical
          exempt_domains: []
        - name: Mailgun API Key
          regex: key-[a-zA-Z0-9]{32}
          severity: high
          exempt_domains: []
        - name: New Relic API Key
          regex: NRAK-[A-Z0-9]{27,}
          severity: critical
          exempt_domains: []
        - name: Hugging Face Token
          regex: hf_[A-Za-z0-9]{20,}
          severity: critical
          exempt_domains: []
        - name: Databricks Token
          regex: dapi[a-z0-9]{30,}
          severity: critical
          exempt_domains: []
        - name: Replicate API Token
          regex: r8_[A-Za-z0-9]{20,}
          severity: critical
          exempt_domains: []
        - name: Together AI Key
          regex: tok_[a-z0-9]{40,}
          severity: critical
          exempt_domains: []
        - name: Pinecone API Key
          regex: pcsk_[a-zA-Z0-9]{36,}
          severity: critical
          exempt_domains: []
        - name: Groq API Key
          regex: gsk_[a-zA-Z0-9]{48,}
          severity: critical
          exempt_domains: []
        - name: xAI API Key
          regex: xai-[a-zA-Z0-9\-_]{80,}
          severity: critical
          exempt_domains: []
        - name: DigitalOcean Token
          regex: dop_v1_[a-f0-9]{64}
          severity: critical
          exempt_domains: []
        - name: HashiCorp Vault Token
          regex: hvs\.[a-zA-Z0-9]{23,}
          severity: critical
          exempt_domains: []
        - name: Vercel Token
          regex: (?:vercel|vc[piark])_[a-zA-Z0-9]{24,}
          severity: critical
          exempt_domains: []
        - name: Supabase Service Key
          regex: sb_secret_[a-zA-Z0-9_-]{20,}
          severity: critical
          exempt_domains: []
        - name: npm Token
          regex: npm_[A-Za-z0-9]{36,}
          severity: critical
          exempt_domains: []
        - name: PyPI Token
          regex: pypi-[A-Za-z0-9_-]{16,}
          severity: critical
          exempt_domains: []
        - name: Linear API Key
          regex: lin_api_[a-zA-Z0-9]{40,}
          severity: high
          exempt_domains: []
        - name: Notion API Key
          regex: ntn_[a-zA-Z0-9]{40,}
          severity: high
          exempt_domains: []
        - name: Sentry Auth Token
          regex: sntrys_[a-zA-Z0-9]{40,}
          severity: high
          exempt_domains: []
        - name: Private Key Header
          regex: '-----BEGIN\s+(RSA\s+|EC\s+|DSA\s+|OPENSSH\s+)?PRIVATE\s+KEY-----'
          severity: critical
          exempt_domains: []
        - name: JWT Token
          regex: (ey[a-zA-Z0-9_\-=]{10,}\.){2}[a-zA-Z0-9_\-=]{10,}
          severity: high
          exempt_domains: []
        - name: Bitcoin WIF Private Key
          regex: (?:5[1-9A-HJ-NP-Za-km-z]{50}|[KL][1-9A-HJ-NP-Za-km-z]{51})
          severity: critical
          validator: wif
          exempt_domains: []
        - name: Extended Private Key
          regex: '[xyzt]prv[1-9A-HJ-NP-Za-km-z]{107,108}'
          severity: critical
          exempt_domains: []
        - name: Ethereum Private Key
          regex: 0x[0-9a-f]{64}\b
          severity: critical
          exempt_domains: []
        - name: Social Security Number
          regex: \b\d{3}-\d{2}-\d{4}\b
          severity: low
          exempt_domains: []
        - name: Google OAuth Client ID
          regex: '[0-9]{6,}-[0-9A-Za-z_]{32}\.apps\.googleusercontent\.com'
          severity: medium
          exempt_domains: []
        - name: Credential in URL
          regex: (?m)(?:^|[?&;])\s*(?:password|passwd|secret|token|apikey|api_key|api-key)\s*=\s*[^\s&]{4,}
          severity: high
          exempt_domains: []
        - name: Environment Variable Secret
          regex: (?-i:[A-Z][A-Z0-9]*[_-](?:SECRET(?:[_-]ACCESS)?[_-]?KEY|SECRET|PASSWORD|PASSWD|TOKEN|API[_-]?KEY))\b\s*=\s*\S{8,}
          severity: high
          exempt_domains: []
        - name: Credit Card Number
          regex: \b\d{4}(?:[- ]?\d){11,15}\b
          severity: medium
          validator: luhn
          exempt_domains: []
        - name: IBAN
          regex: \b[A-Z]{2}\d{2}[A-Z0-9]{11,30}\b
          severity: medium
          validator: mod97
          exempt_domains: []
canary_tokens:
    enabled: false
    tokens: []
response_scanning:
    enabled: true
    action: warn
    ask_timeout_seconds: 0
    include_defaults: null
    patterns:
        - name: Prompt Injection
          regex: (?i)(ignore|disregard|forget|abandon)[-,;:.\s]+\s*(?:all\s+\w+\s+|\w+\s+all\s+|all\s+|\w+\s+)?(previous|prior|above|earlier)\s+(\w+\s+)?(instructions|prompts|rules|context|directives|constraints|policies|guardrails)
        - name: System Override
          regex: '(?im)^\s*system\s*:'
        - name: Role Override
          regex: (?i)you\s+are\s+(now\s+)?(a\s+)?((?-i:\bDAN\b)|evil|unrestricted|jailbroken|unfiltered)
        - name: New Instructions
          regex: (?i)(new|updated|revised)\s+(instructions|directives|rules|prompt)
        - name: Jailbreak Attempt
          regex: (?i)((?-i:\bDAN\b)|developer\s+mode|sudo\s+mode|unrestricted\s+mode)
        - name: Hidden Instruction
          regex: (?i)(do\s+not\s+(reveal|tell|show|display|mention)\s+this\s+to\s+the\s+user|hidden\s+instruction|invisible\s+to\s+(the\s+)?user|the\s+user\s+(cannot|must\s+not|should\s+not)\s+see\s+this)
        - name: Behavior Override
          regex: (?i)from\s+now\s+on\s+(you\s+)?(will|must|should|shall)\s+
        - name: Encoded Payload
          regex: (?i)(decode\s+(this|the\s+following)\s+(from\s+)?base64\s+and\s+(execute|run|follow)|eval\s*\(\s*atob\s*\()
        - name: Tool Invocation
          regex: (?i)you\s+must\s+(\w+\s+)?(call|execute|run|invoke)\s+(the|this|a)\s+(\w+\s+)?(function|tool|command|api|endpoint)
        - name: Authority Escalation
          regex: (?i)you\s+(now\s+)?have\s+(full\s+)?(admin|root|system|superuser|elevated)\s+(access|privileges|permissions|rights)
        - name: Instruction Downgrade
          regex: (?i)(treat|consider|regard|reinterpret|downgrade)\s+((?:the|all)\s+)?(previous|prior|above|earlier|system|policy|original|existing)\s+(\w+\s+)?(text|instructions?|rules|directives|guidelines|safeguards|constraints|controls|checks|context|prompt|policies|guardrails|parameters)\s+((as|to)\s+)?(historical|outdated|deprecated|optional|background|secondary|non-binding|non-authoritative|informational|advisory)
        - name: Instruction Dismissal
          regex: (?i)(set|put)\s+(the\s+)?(previous|prior|above|earlier|system|original)\s+(\w+\s+)?(instructions?|directives|rules|constraints|context|prompt|safeguards|guidelines|policies|guardrails)\s+(aside|away|to\s+(one|the)\s+side)
        - name: Priority Override
          regex: (?i)\bprioritize\s+(the\s+)?(task|user|current|new|latest)\s+(request|message|input|instructions?|prompt)
        - name: Credential Solicitation
          regex: (?is)\b(send|provide|paste|return|include|supply|submit|share)\b.{0,80}\b(password|passwd|token|api[_ -]?key|secret|credential|private[_ -]?key|ssh[_ -]?key|session[_ -]?cookie)\b
        - name: Credential Path Directive
          regex: (?is)\b(read|get|fetch|retrieve|cat|copy|extract|open)\b.{0,80}(\.ssh[/\\]|\.aws[/\\]credentials|\.env\b|\.npmrc\b|\.pypirc\b|\.netrc\b|\bid_rsa\b|\bid_ed25519\b|\bkubeconfig\b|/etc/passwd\b|/etc/shadow\b)
        - name: Auth Material Requirement
          regex: (?is)\bto\s+(complete|continue|finish|proceed|verify)\b.{0,80}\b(authentication|credential|token|api[_ -]?key|private[_ -]?key|ssh[_ -]?key)\b.{0,40}\b(required|needed|necessary|must be)\b
        - name: Memory Persistence Directive
          regex: (?is)\b(save|store|remember|retain|persist|record|cache)\b.{0,40}\b(this|these|that|it|the)\b.{0,60}\b(for future|for later|across sessions?|next session|next time|future tasks?|subsequent|permanently|from now on|going forward|in all future)\b
        - name: Preference Poisoning
          regex: (?is)\b(from now on|always|going forward|in future)\b.{0,80}\b(prefer|prioritize|trust|choose|use|default to)\b.{0,60}\b(this tool|that tool|my tool|the external|the remote)\b
        - name: Silent Credential Handling
          regex: (?is)\b(do not|don'?t|never)\s+(mention|display|show|tell|reveal|log|report)\b.{0,100}\b(password|token|secret|credential|private[_ -]?key|api[_ -]?key)\b
        - name: Covert Action Directive
          regex: (?is)(secretly|silently|covertly|quietly|without\s+(?:the\s+user\s+)?(?:knowing|noticing|seeing))[,;:]?\s+.{0,40}\b(execut\w*|run|call|invoke|send|fetch|curl|wget|download|upload|post)\b
        - name: Instruction Boundary
          regex: (<\|(?:endoftext|im_start|im_end|system|end_header_id|begin_of_text)\|>|\[/?INST\]|<\|(?:user|assistant)\|>|<<SYS>>)
        - name: CJK Instruction Override ZH
          regex: (忽略|无视|忽视|不理|不要遵[循守]|放弃|跳过).{0,10}(之前|以上|上述|以前|上面|先前|前面).{0,8}(所有|全部|一切)?.{0,6}(指令|指示|说明|规则|命令|提示|约束|限制)
        - name: CJK Instruction Override JP
          regex: (以前|前|上記|これまで|今まで).{0,6}(指示|命令|ルール|規則|指令).{0,6}(すべて|全て|全部)?.{0,4}(無視|忘れ|従わな|捨て)
        - name: CJK Instruction Override KR
          regex: (이전|위|앞|기존).{0,6}(모든\s*)?(지시|지침|명령|규칙|지령).{0,6}(무시|잊어|따르지|어기|무효)
        - name: CJK Jailbreak Mode
          regex: (开发者模式|无限制模式|開発者モード|制限なしモード|개발자\s*모드|제한\s*없는\s*모드|没有任何?限制|制限.{0,4}(解除|無視)|제한.{0,4}(해제|무시))
    exempt_domains: []
    sse_streaming:
        enabled: true
        action: block
        max_event_bytes: 65536
