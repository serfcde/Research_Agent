global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: research-agent
    metrics_path: /metrics
    static_configs:
      # Container name when run via docker compose; swap for
      # host.docker.internal:8000 to scrape a locally-run backend.
      - targets: ["research-agent:8000"]
