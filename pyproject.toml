[tool.ruff]
target-version = "py312"
line-length = 120
extend-exclude = ["venv", ".venv", "frontend", "data", "research_outputs"]

[tool.ruff.lint]
# E/W pycodestyle, F pyflakes, I import sorting, B bugbear, UP pyupgrade
select = ["E", "W", "F", "I", "B", "UP"]
ignore = [
    "E501",  # long lines: prompts and log strings read better unwrapped
    "B008",  # FastAPI Depends() in defaults is idiomatic
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["B017"]

# pytest configuration lives in pytest.ini
